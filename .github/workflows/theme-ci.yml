name: Theme CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: read

jobs:
  ddev-theme-test:
    runs-on: ubuntu-latest
    env:
      COMPOSER_NO_INTERACTION: "1"
      DDEV_NONINTERACTIVE: "true"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Configure GitHub Packages auth
        env:
          FDIC_DS_NPM_TOKEN: ${{ secrets.FDIC_DS_NPM_TOKEN }}
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          token="${FDIC_DS_NPM_TOKEN:-$GITHUB_TOKEN}"
          printf '//npm.pkg.github.com/:_authToken=%s\n' "$token" >> .npmrc

      - name: Install host test dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y php-cli

      - name: Install DDEV
        run: |
          curl -fsSL https://pkg.ddev.com/apt/gpg.key | gpg --dearmor | sudo tee /usr/share/keyrings/ddev.gpg > /dev/null
          echo "deb [signed-by=/usr/share/keyrings/ddev.gpg] https://pkg.ddev.com/apt/ * *" | sudo tee /etc/apt/sources.list.d/ddev.list
          sudo apt-get update
          sudo apt-get install -y ddev

      - name: Install npm dependencies
        run: npm ci

      - name: Run static theme tests
        run: npm test

      - name: Bootstrap DDEV Drupal site
        run: scripts/bootstrap.sh

      - name: Verify DDEV Drupal site
        run: scripts/verify-ddev.sh

      - name: Export static Pages snapshot
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: scripts/export-static.sh

      - name: Upload GitHub Pages artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Stop DDEV
        if: always()
        run: |
          if command -v ddev >/dev/null 2>&1; then
            ddev poweroff || true
          fi

  deploy-pages:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: ddev-theme-test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    concurrency:
      group: github-pages
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Deploy GitHub Pages snapshot
        id: deployment
        uses: actions/deploy-pages@v4
