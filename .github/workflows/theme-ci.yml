name: Theme CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  ddev-theme-test:
    runs-on: ubuntu-latest
    env:
      COMPOSER_NO_INTERACTION: "1"
      DDEV_NONINTERACTIVE: "true"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Configure GitHub Packages auth
        env:
          FDIC_DS_NPM_TOKEN: ${{ secrets.FDIC_DS_NPM_TOKEN }}
        run: |
          if [ -z "$FDIC_DS_NPM_TOKEN" ]; then
            echo "FDIC_DS_NPM_TOKEN is required to install the FDIC Design System packages from GitHub Packages." >&2
            exit 1
          fi
          printf '//npm.pkg.github.com/:_authToken=%s\n' "$FDIC_DS_NPM_TOKEN" >> .npmrc

      - name: Install host test dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y php-cli

      - name: Install DDEV
        run: |
          curl -fsSL https://pkg.ddev.com/apt/gpg.key | gpg --dearmor | sudo tee /usr/share/keyrings/ddev.gpg > /dev/null
          echo "deb [signed-by=/usr/share/keyrings/ddev.gpg] https://pkg.ddev.com/apt/ * *" | sudo tee /etc/apt/sources.list.d/ddev.list
          sudo apt-get update
          sudo apt-get install -y ddev

      - name: Install npm dependencies
        run: npm ci

      - name: Run static theme tests
        run: npm test

      - name: Bootstrap DDEV Drupal site
        run: scripts/bootstrap.sh --quick

      - name: Verify DDEV Drupal site
        run: scripts/verify-ddev.sh

      - name: Stop DDEV
        if: always()
        run: |
          if command -v ddev >/dev/null 2>&1; then
            ddev poweroff || true
          fi
