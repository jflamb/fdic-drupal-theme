# Load the canonical component stylesheet so Drupal serves the same public
# CMS/browser contract documented by the design system package. This stylesheet
# imports the token runtime and includes the supported fdic-composition-* page
# patterns used by the theme's curated FDICnet example content.
components:
  css:
    base:
      node_modules/@jflamb/fdic-ds-components/styles.css: {}
  js:
    js/custom-icons.js:
      attributes:
        type: module
    node_modules/@jflamb/fdic-ds-components/dist/register/register-all.js:
      attributes:
        type: module
# Header-specific adapter code stays separate so it only loads on header markup.
# fdic_preprocess_html() also exposes this adapter path through an import map
# for js/global-header-init.js's bare module specifier.
global-header:
  js:
    node_modules/@jflamb/fdic-ds-components/dist/fd-global-header-drupal.js:
      attributes:
        type: module
    js/global-header-init.js:
      attributes:
        type: module
  dependencies:
    - fdic/components

# Theme glue CSS consumes DS tokens and styles Drupal-specific layout/templates.
theme:
  js:
    js/design-system-init.js:
      attributes:
        type: module
    js/form-fallback-init.js:
      attributes:
        type: module
    js/pagination-init.js:
      attributes:
        type: module
  css:
    theme:
      css/theme.css: {}
  dependencies:
    - fdic/components
